services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: applyflow
      POSTGRES_USER: applyflow
      POSTGRES_PASSWORD: applyflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U applyflow -d applyflow"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - applyflow-postgres:/var/lib/postgresql/data

  app:
    build: .
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/applyflow
      DATABASE_USERNAME: applyflow
      DATABASE_PASSWORD: applyflow
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  applyflow-postgres:
