openapi: 3.0.3
info:
  title: ApplyFlow API
  version: v1
  description: The versioned API for the ApplyFlow portfolio application.
paths:
  /api/v1/applications:
    post:
      operationId: createApplication
      tags: [Applications]
      summary: Quick-capture a Saved application
      description: >
        Creates an owner-scoped Saved application using exactly one active companyId or a companyName
        that is created atomically as a name-only company.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateApplicationRequest' }
      responses:
        '201':
          description: Saved application created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Application' }
        default: { $ref: '#/components/responses/Problem' }
  /api/v1/companies:
    get:
      operationId: listCompanies
      tags: [Companies]
      summary: List active or archived companies owned by the current user
      security: [{ bearerAuth: [] }]
      parameters:
        - name: archived
          in: query
          required: false
          schema: { type: boolean, default: false }
      responses:
        '200':
          description: Owner-scoped companies ordered by normalized name
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CompanyListResponse' }
        default: { $ref: '#/components/responses/Problem' }
    post:
      operationId: createCompany
      tags: [Companies]
      summary: Create a private company
      description: Names are trimmed, whitespace-normalized, case-folded, and unique within the current user's workspace.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCompanyRequest' }
      responses:
        '201':
          description: Company created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Company' }
        default: { $ref: '#/components/responses/Problem' }
  /api/v1/companies/{companyId}:
    parameters:
      - name: companyId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: getCompany
      tags: [Companies]
      summary: Get an owned active or archived company
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Company details
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Company' }
        default: { $ref: '#/components/responses/Problem' }
    put:
      operationId: updateCompany
      tags: [Companies]
      summary: Update an owned company
      description: The last-read version is required; stale writes return 409 Conflict.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateCompanyRequest' }
      responses:
        '200':
          description: Company updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Company' }
        default: { $ref: '#/components/responses/Problem' }
  /api/v1/companies/{companyId}/archive:
    post:
      operationId: archiveCompany
      tags: [Companies]
      summary: Archive an owned active company
      security: [{ bearerAuth: [] }]
      parameters:
        - name: companyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CompanyVersionRequest' }
      responses:
        '200':
          description: Company archived
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Company' }
        default: { $ref: '#/components/responses/Problem' }
  /api/v1/companies/{companyId}/restore:
    post:
      operationId: restoreCompany
      tags: [Companies]
      summary: Restore an owned archived company
      security: [{ bearerAuth: [] }]
      parameters:
        - name: companyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CompanyVersionRequest' }
      responses:
        '200':
          description: Company restored
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Company' }
        default: { $ref: '#/components/responses/Problem' }
  /api/v1/auth/register:
    post:
      operationId: register
      tags: [Authentication]
      summary: Create a private user account
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '200':
          description: Account created; an HttpOnly refresh cookie is also established
          headers:
            Set-Cookie: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        default:
          $ref: '#/components/responses/Problem'
  /api/v1/auth/login:
    post:
      operationId: login
      tags: [Authentication]
      summary: Sign in with an email address and password
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Authenticated; an HttpOnly refresh cookie is also established
          headers:
            Set-Cookie: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        default:
          $ref: '#/components/responses/Problem'
  /api/v1/auth/refresh:
    post:
      operationId: refresh
      tags: [Authentication]
      summary: Restore an access token from the refresh cookie
      responses:
        '200':
          description: Identity restored and the refresh token rotated
          headers:
            Set-Cookie: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        default:
          $ref: '#/components/responses/Problem'
  /api/v1/auth/logout:
    post:
      operationId: logout
      tags: [Authentication]
      summary: Revoke the current refresh session and clear its cookie
      responses:
        '204': { description: Signed out }
        default:
          $ref: '#/components/responses/Problem'
  /api/v1/auth/me:
    get:
      operationId: getCurrentUser
      tags: [Authentication]
      summary: Retrieve the user represented by the access token
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Current private user context
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CurrentUser' }
        default:
          $ref: '#/components/responses/Problem'
    put:
      operationId: updateProfile
      tags: [Authentication]
      summary: Update the current user's profile preferences
      description: Uses optimistic versioning; a stale version returns 409 Conflict.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateProfileRequest' }
      responses:
        '200':
          description: Updated private user context
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CurrentUser' }
        default:
          $ref: '#/components/responses/Problem'
  /api/v1/auth/sessions:
    get:
      operationId: listSessions
      tags: [Authentication]
      summary: List the user's active device sessions
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Active sessions, with no refresh-token values
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeviceSessionsResponse' }
        default:
          $ref: '#/components/responses/Problem'
  /api/v1/auth/sessions/{sessionId}:
    delete:
      operationId: revokeSession
      tags: [Authentication]
      summary: Revoke one owned device session
      security: [{ bearerAuth: [] }]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Session revoked, or it was not an active session owned by the user }
        default:
          $ref: '#/components/responses/Problem'
  /api/v1/auth/logout-all:
    post:
      operationId: logoutEverywhere
      tags: [Authentication]
      summary: Revoke every refresh session owned by the current user
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: All device sessions revoked and the refresh cookie cleared }
        default:
          $ref: '#/components/responses/Problem'
  /api/v1/system/status:
    get:
      operationId: getSystemStatus
      tags: [System]
      summary: Check the API and database path
      responses:
        '200':
          description: The application and migrated database are available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemStatus'
        default:
          description: An RFC 9457 API problem
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    Problem:
      description: An RFC 9457 API problem
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetail' }
  schemas:
    CreateApplicationRequest:
      type: object
      required: [jobTitle]
      description: Exactly one of companyId or companyName must be provided.
      properties:
        companyId:
          type: string
          format: uuid
          nullable: true
          description: An active company owned by the authenticated user
        companyName:
          type: string
          maxLength: 200
          nullable: true
          description: A unique name-only company to create in the same transaction
        jobTitle: { type: string, minLength: 1, maxLength: 300 }
        postingUrl: { type: string, maxLength: 2048, nullable: true }
        location: { type: string, maxLength: 200, nullable: true }
        description: { type: string, maxLength: 20000, nullable: true }
        notes: { type: string, maxLength: 10000, nullable: true }
        employmentType:
          allOf: [{ $ref: '#/components/schemas/EmploymentType' }]
          nullable: true
        workplaceArrangement:
          allOf: [{ $ref: '#/components/schemas/WorkplaceArrangement' }]
          nullable: true
        salaryMin: { type: number, minimum: 0, nullable: true }
        salaryMax: { type: number, minimum: 0, nullable: true }
        salaryCurrency:
          type: string
          pattern: '^[A-Za-z]{3}$'
          nullable: true
          description: ISO 4217 alphabetic currency code
        salaryPayPeriod:
          allOf: [{ $ref: '#/components/schemas/PayPeriod' }]
          nullable: true
        sourceCategory:
          allOf: [{ $ref: '#/components/schemas/SourceCategory' }]
          nullable: true
        sourceDetail: { type: string, maxLength: 500, nullable: true }
    Application:
      type: object
      required: [id, company, jobTitle, status, createdAt, updatedAt, version]
      properties:
        id: { type: string, format: uuid }
        company: { $ref: '#/components/schemas/ApplicationCompany' }
        jobTitle: { type: string }
        status: { type: string, enum: [SAVED] }
        postingUrl: { type: string, nullable: true }
        location: { type: string, nullable: true }
        description: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        employmentType:
          allOf: [{ $ref: '#/components/schemas/EmploymentType' }]
          nullable: true
        workplaceArrangement:
          allOf: [{ $ref: '#/components/schemas/WorkplaceArrangement' }]
          nullable: true
        salaryMin: { type: number, nullable: true }
        salaryMax: { type: number, nullable: true }
        salaryCurrency: { type: string, nullable: true }
        salaryPayPeriod:
          allOf: [{ $ref: '#/components/schemas/PayPeriod' }]
          nullable: true
        sourceCategory:
          allOf: [{ $ref: '#/components/schemas/SourceCategory' }]
          nullable: true
        sourceDetail: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        version: { type: integer, format: int64 }
    ApplicationCompany:
      type: object
      required: [id, name]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
    EmploymentType:
      type: string
      enum: [FULL_TIME, PART_TIME, CONTRACT, TEMPORARY, INTERNSHIP, OTHER]
    WorkplaceArrangement:
      type: string
      enum: [REMOTE, HYBRID, ON_SITE]
    PayPeriod:
      type: string
      enum: [HOURLY, MONTHLY, YEARLY]
    SourceCategory:
      type: string
      enum: [COMPANY_WEBSITE, LINKEDIN, INDEED, REFERRAL, RECRUITER, OTHER_JOB_BOARD, CAREER_FAIR, OTHER]
    CreateCompanyRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        website: { type: string, maxLength: 2048, nullable: true }
        industry: { type: string, maxLength: 200, nullable: true }
        location: { type: string, maxLength: 200, nullable: true }
        notes: { type: string, maxLength: 10000, nullable: true }
    UpdateCompanyRequest:
      allOf:
        - { $ref: '#/components/schemas/CreateCompanyRequest' }
        - type: object
          required: [version]
          properties:
            version: { type: integer, format: int64, minimum: 0 }
    CompanyVersionRequest:
      type: object
      required: [version]
      properties:
        version: { type: integer, format: int64, minimum: 0 }
    Company:
      type: object
      required: [id, name, archived, createdAt, updatedAt, version]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        website: { type: string, nullable: true }
        industry: { type: string, nullable: true }
        location: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        archived: { type: boolean }
        archivedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        version: { type: integer, format: int64 }
    CompanyListResponse:
      type: object
      required: [companies]
      properties:
        companies:
          type: array
          items: { $ref: '#/components/schemas/Company' }
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email, maxLength: 320 }
        password: { type: string, format: password, minLength: 12, maxLength: 128 }
        timeZone:
          type: string
          maxLength: 255
          description: Optional browser-suggested IANA zone; defaults to UTC when omitted
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email, maxLength: 320 }
        password: { type: string, format: password, maxLength: 128 }
    CurrentUser:
      type: object
      required: [id, email, createdAt, timeZone, version]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        createdAt: { type: string, format: date-time }
        timeZone: { type: string, example: America/Vancouver }
        version: { type: integer, format: int64 }
    UpdateProfileRequest:
      type: object
      required: [timeZone, version]
      properties:
        timeZone: { type: string, minLength: 1, maxLength: 255, example: America/Vancouver }
        version: { type: integer, format: int64, minimum: 0 }
    AuthResponse:
      type: object
      required: [accessToken, expiresIn, user]
      properties:
        accessToken: { type: string, description: A 15-minute JWT held by the SPA in memory }
        expiresIn: { type: integer, format: int64, example: 900 }
        user: { $ref: '#/components/schemas/CurrentUser' }
    DeviceSession:
      type: object
      required: [id, createdAt, lastUsedAt, expiresAt, current]
      properties:
        id: { type: string, format: uuid, description: Stable identifier for this device session }
        createdAt: { type: string, format: date-time }
        lastUsedAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time, description: Earlier of inactivity and absolute expiration }
        current: { type: boolean }
    DeviceSessionsResponse:
      type: object
      required: [sessions]
      properties:
        sessions:
          type: array
          items: { $ref: '#/components/schemas/DeviceSession' }
    SystemStatus:
      type: object
      required: [status, version, database]
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: 0.1.0
        database:
          type: string
          example: connected
    ProblemDetail:
      type: object
      required: [type, title, status, detail, instance, code, timestamp, traceId]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer, format: int32 }
        detail: { type: string }
        instance: { type: string, format: uri }
        code: { type: string }
        timestamp: { type: string, format: date-time }
        traceId: { type: string, format: uuid }
        fieldErrors:
          type: object
          additionalProperties: { type: string }
